<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Performance Analytics</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; margin: 40px; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; }
        input[type="number"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        input[type="submit"] { width: 100%; background: #2563eb; color: white; border: none; padding: 12px; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; }
        input[type="submit"]:hover { background: #1d4ed8; }
        .result-box { margin-top: 25px; padding: 15px; background: #e2f0d9; border-left: 5px solid #28a745; text-align: center; font-size: 18px; font-weight: bold; color: #1e4620; }
    </style>
</head>
<body>

<div class="container">
    <a href="/" style="text-decoration: none; color: #2563eb; font-size: 14px; font-weight: bold;">← Back to Dashboard</a>
    <h2 style="margin-top: 10px; text-align: center;">Predict Student Math Score</h2>
    
    <form action="{{ url_for('predict_datapoint')}}" method="POST">
        
        <div class="form-group">
            <label>Gender:</label>
            <select name="gender" required>
                <option value="" disabled selected>Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div class="form-group">
            <label>Race/Ethnicity:</label>
            <select name="race_ethnicity" required>
                <option value="" disabled selected>Select Group</option>
                <option value="group A">Group A</option>
                <option value="group B">Group B</option>
                <option value="group C">Group C</option>
                <option value="group D">Group D</option>
                <option value="group E">Group E</option>
            </select>
        </div>

        <div class="form-group">
            <label>Parental Level of Education:</label>
            <select name="parental_level_of_education" required>
                <option value="" disabled selected>Select Education</option>
                <option value="some high school">Some High School</option>
                <option value="high school">High School</option>
                <option value="some college">Some College</option>
                <option value="associate's degree">Associate's Degree</option>
                <option value="bachelor's degree">Bachelor's Degree</option>
                <option value="master's degree">Master's Degree</option>
            </select>
        </div>

        <div class="form-group">
            <label>Lunch Type:</label>
            <select name="lunch" required>
                <option value="" disabled selected>Select Lunch Option</option>
                <option value="standard">Standard</option>
                <option value="free/reduced">Free/Reduced</option>
            </select>
        </div>

        <div class="form-group">
            <label>Test Preparation Course:</label>
            <select name="test_preparation_course" required>
                <option value="" disabled selected>Course Status</option>
                <option value="none">None</option>
                <option value="completed">Completed</option>
            </select>
        </div>

        <div class="form-group">
            <label>Reading Score (0-100):</label>
            <input type="number" name="reading_score" min="0" max="100" placeholder="e.g. 75" required>
        </div>

        <div class="form-group">
            <label>Writing Score (0-100):</label>
            <input type="number" name="writing_score" min="0" max="100" placeholder="e.g. 80" required>
        </div>

        <input type="submit" value="Predict Math Score">
    </form>

    {% if results %}
    <div class="result-box">
        Predicted Math Score: {{ results }} / 100
    </div>
    {% endif %}
</div>

</body>
</html>
